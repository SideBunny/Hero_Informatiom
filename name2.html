/* =========================
CARGAR IMAGENES
========================= */

function esCelular(){
return window.innerWidth <= 768;
}

function cargarImagenes(){

const orange = document.getElementById("orangeLine");
const bannerImg = document.getElementById("bannerImg");

bannerImg.src = pagina.banner.img;

if(esCelular()){
orange.style.backgroundImage=`url(${pagina.orangeLine.cell})`;
}else{
orange.style.backgroundImage=`url(${pagina.orangeLine.pc})`;
}

}

cargarImagenes();
window.addEventListener("resize",cargarImagenes);


/* =========================
CLICK BANNER
========================= */

document.getElementById("bannerLink").onclick=()=>{
window.location.href=pagina.banner.ruta;
};


/* =========================
RENDER SECCIONES
========================= */

const main = document.getElementById("mainContainer");

pagina.secciones.forEach(seccion =>{

const layout = document.createElement("div");
layout.className="news-layout";

layout.innerHTML=`
<div class="left-column">
<div class="oneNews"></div>
<div class="twoNews"></div>
</div>
<div class="right-column">
<div class="threeNews"></div>
</div>
`;

main.appendChild(layout);

const oneContainer = layout.querySelector(".oneNews");
const twoContainer = layout.querySelector(".twoNews");
const threeContainer = layout.querySelector(".threeNews");

/* ONE */
seccion.One_News.forEach(n=>{

let fechaHTML="";
if(n.Fecha && n.Fecha.length){
fechaHTML=`<div class="news-date">${n.Fecha.join(" ")}</div>`;
}

const card=document.createElement("div");
card.className="news-card big-news";

card.innerHTML=`
<img src="${n.Imagen}" onclick="window.location.href='${n.Ruta}'">
<div class="news-info">
<h2 onclick="window.location.href='${n.Ruta}'">${n.texto.join("")}</h2>
${fechaHTML}
</div>
`;

oneContainer.appendChild(card);

});

/* TWO */

`;
